name: 뉴스 수집 및 배포

on:
  schedule:
    # 자동 갱신은 하루 1회 (비용 절약) — KST 07:07 = UTC 22:07 전일
    # 분(分)을 정시 00에서 비켜둠: GitHub cron은 정시에 전 세계 작업이 몰려
    # 지연·누락이 심함. 5의 배수도 아닌 07분으로 혼잡 회피.
    - cron: "7 22 * * *"
  push:
    branches: [main]        # briefing.json 등 갱신 푸시 시 즉시 재배포(public repo라 Actions 무료)
  workflow_dispatch: {}     # 필요 시 수동 실행(Run workflow)으로 즉시 갱신

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: 뉴스 수집 실행
        # 브리핑은 briefing.json에서 읽음 — 외부 API·키 불필요(전부 표준 라이브러리)
        run: python3 fetch_news.py

      - name: index.html 준비
        run: |
          mkdir -p public
          cp news_*.html public/
          cp "$(ls -t news_*.html | head -1)" public/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

name: 뉴스 수집 및 배포

on:
  schedule:
    # 자동 갱신은 하루 1회 (비용 절약) — KST 07:00 = UTC 22:00 전일
    - cron: "0 22 * * *"
  workflow_dispatch: {}   # 필요 시 수동 실행(Run workflow)으로 즉시 갱신

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: 의존성 설치
        run: pip install anthropic

      - name: 뉴스 수집 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 fetch_news.py

      - name: index.html 준비
        run: |
          mkdir -p public
          cp news_*.html public/
          cp "$(ls -t news_*.html | head -1)" public/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
